<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>QR Scanner Kamera</title>

  <!-- Library QR Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e3a8a);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:white;
    }

    .card{
      width:100%;
      max-width:430px;
      background:rgba(255,255,255,.1);
      backdrop-filter:blur(15px);
      border-radius:25px;
      padding:25px;
      box-shadow:0 20px 50px rgba(0,0,0,.4);
    }

    h1{
      text-align:center;
      margin-bottom:10px;
    }

    .desc{
      text-align:center;
      color:#cbd5e1;
      margin-bottom:20px;
      font-size:14px;
    }

    #reader{
      width:100%;
      overflow:hidden;
      border-radius:20px;
      border:2px solid #38bdf8;
    }

    button{
      width:100%;
      border:none;
      padding:15px;
      border-radius:15px;
      margin-top:18px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      color:white;
    }

    .start{
      background:linear-gradient(135deg,#22c55e,#15803d);
    }

    .stop{
      background:linear-gradient(135deg,#ef4444,#b91c1c);
    }

    .hasil{
      margin-top:20px;
      background:white;
      color:#0f172a;
      border-radius:18px;
      padding:18px;
      display:none;
      animation:fade .4s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .status{
      margin-top:10px;
      display:inline-block;
      background:#dcfce7;
      color:#15803d;
      padding:8px 14px;
      border-radius:999px;
      font-weight:bold;
      font-size:14px;
    }

    .success{
      color:#16a34a;
      font-size:22px;
      font-weight:bold;
      margin-bottom:10px;
      text-align:center;
    }
  </style>
</head>
<body>

<div class="card">

  <h1>Scan QR Code</h1>

  <p class="desc">
    Izinkan akses kamera untuk memindai QR Code
  </p>

  <div id="reader"></div>

  <button class="start" onclick="startScanner()">
    Mulai Scan
  </button>

  <button class="stop" onclick="stopScanner()">
    Stop Kamera
  </button>

  <div class="hasil" id="hasil">

    <div class="success">
      ✓ QR Berhasil Dipindai
    </div>

    <p><b>Data QR:</b></p>
    <p id="qrResult"></p>

    <div class="status">
      Status: Hadir
    </div>

  </div>

</div>

<script>
let scanner;

function startScanner() {
  document.getElementById("hasil").style.display = "none";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: { width: 250, height: 250 }
    },
    function(decodedText) {
      document.getElementById("hasil").style.display = "block";
      document.getElementById("qrResult").innerText = decodedText;

      scanner.stop();
    },
    function(errorMessage) {}
  ).catch(function(err) {
    alert(
      "Kamera gagal dibuka.\n\n" +
      "Solusi:\n" +
      "1. Jalankan di HTTPS seperti Vercel/GitHub Pages\n" +
      "2. Izinkan kamera di browser\n" +
      "3. Jangan buka dari file:// atau localhost HP"
    );
    console.log(err);
  });
}

function stopScanner() {
  if (scanner) {
    scanner.stop().catch(err => console.log(err));
  }
}
</script>

</body>
</html>
